name: Publish to npm

# On every push to main: read the version from package.json, and if that exact
# version is not already published on npm, build (if a build script exists) and
# publish it using npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
on:
  push:
    branches: [main]

# Avoid two publishes racing if pushes land close together.
concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC). Without this the OIDC
      # token can't be minted and npm publish falls back to needing a token.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Read package name and version
        id: pkg
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $NAME@$VERSION"

      - name: Check if version already exists on npm
        id: check
        run: |
          NAME="${{ steps.pkg.outputs.name }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already on npm — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION not found on npm — will publish."
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build (if a build script exists)
        if: steps.check.outputs.exists == 'false'
        run: npm run build --if-present

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: steps.check.outputs.exists == 'false'
        # No NODE_AUTH_TOKEN: auth is handled via OIDC once the Trusted
        # Publisher is configured on npm. Provenance is attached automatically.
        run: npm publish --access public
